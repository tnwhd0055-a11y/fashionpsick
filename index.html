<!-- @dsCard group="Storefront" viewport="1440x900" name="SIK Storefront" subtitle="Home · Collection · Product · About — interactive recreation" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIK — Storefront</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; background: var(--paper); }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#111111"/>
    <text x="50" y="60" font-family="Arial, sans-serif" font-weight="800" font-size="34" letter-spacing="2" text-anchor="middle" fill="#ffffff">SIK</text>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design system bundle + shared data (plain scripts) -->
<script src="_ds_bundle.js"></script>
<script src="data.js"></script>

<!-- Shared helpers + screens (babel, define window globals) -->
<script type="text/babel" src="kit-shared.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Collection.jsx"></script>
<script type="text/babel" src="Product.jsx"></script>
<script type="text/babel" src="About.jsx"></script>

<!-- App shell -->
<script type="text/babel">
  function App() {
    const [screen, setScreen] = React.useState("New");
    const [productId, setProductId] = React.useState(null);

    const go = (s) => { setScreen(s); window.scrollTo({ top: 0 }); };

    const nav = (link) => {
      if (link === "New") return go("home");
      if (link === "About") return go("about");
      // Necklaces / Gymwear / Lookbook all land on the collection in this demo
      return go("collection");
    };
    const openProduct = (id) => { setProductId(id); go("product"); };

    // map initial "New" → home
    const current = screen === "New" ? "home" : screen;

    if (current === "home") return <window.Home nav={nav} openProduct={openProduct} />;
    if (current === "collection") return <window.Collection nav={nav} openProduct={openProduct} />;
    if (current === "product") return <window.Product nav={nav} openProduct={openProduct} productId={productId} />;
    if (current === "about") return <window.About nav={nav} />;
    return <window.Home nav={nav} openProduct={openProduct} />;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
